name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # All service packages are importable from their source roots.
  PYTHONPATH: >-
    ${{ github.workspace }}/gateway:${{ github.workspace }}/scheduler:${{ github.workspace }}/node_agent:${{ github.workspace }}/model_runtime_manager

jobs:
  # =========================================================================
  # Lint
  # =========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Lint gateway
        run: ruff check gateway/

      - name: Lint scheduler
        run: ruff check scheduler/

      - name: Lint node_agent
        run: ruff check node_agent/

      - name: Lint tests
        run: ruff check tests/

  # =========================================================================
  # Unit tests
  # =========================================================================
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dependencies
        run: |
          pip install -r gateway/requirements.txt
          pip install -r scheduler/requirements.txt
          pip install -r node_agent/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --tb=short \
            -m "not system"

  # =========================================================================
  # Integration tests
  # =========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dependencies
        run: |
          pip install -r gateway/requirements.txt
          pip install -r scheduler/requirements.txt
          pip install -r node_agent/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --tb=short \
            -m "not system"
        env:
          # Integration tests use fakeredis — real Redis service above is
          # only needed if any test opts into a live Redis connection.
          SCHEDULER_REDIS_URL: redis://localhost:6379/15

  # =========================================================================
  # Resilience tests — fault injection, load, and recovery invariants.
  # Runs after integration on main branch or manual trigger.
  # Allowed to be slower; must pass before release.
  # =========================================================================
  resilience:
    name: Resilience Tests
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install service dependencies
        run: |
          pip install -r gateway/requirements.txt
          pip install -r scheduler/requirements.txt
          pip install -r node_agent/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Run resilience tests
        run: |
          pytest tests/resilience/ -v \
            --tb=short \
            -m "not system" \
            --timeout=60

  # =========================================================================
  # System tests (optional — runs only on main branch or manual trigger)
  # =========================================================================
  system:
    name: System Tests
    runs-on: ubuntu-latest
    needs: [unit, integration, resilience]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install service dependencies + test tools
        run: |
          pip install -r gateway/requirements.txt
          pip install -r scheduler/requirements.txt
          pip install -r node_agent/requirements.txt
          pip install -r tests/requirements.txt

      - name: Start stack (no GPU services)
        run: |
          docker compose -f docker-compose.dev.yml up -d \
            db mlflow scheduler
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          POSTGRES_MLFLOW_DB: mlflow
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          HF_TOKEN: ""

      - name: Wait for scheduler to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8030/health && break
            echo "Waiting for scheduler... ($i/30)"
            sleep 3
          done

      - name: Run system tests
        run: |
          pytest tests/system/ -v \
            --tb=short \
            -m system
        env:
          GATEWAY_URL: http://localhost:8080
          SCHEDULER_URL: http://localhost:8030
          NODE_AGENT_URL: http://localhost:8020
          TEST_MODEL: qwen-base

      - name: Collect service logs on failure
        if: failure()
        run: docker compose -f docker-compose.dev.yml logs --tail=100

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
