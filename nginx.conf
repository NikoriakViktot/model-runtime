events {
    worker_connections 1024;
}

http {
    upstream gateway {
        server gateway:8080;
    }
    upstream frontend {
        server frontend:8502;
    }
    upstream control_plane {
        server control_plane:8004;
    }
    upstream mlflow {
        server mlflow:5000;
    }
    upstream litellm {
        server litellm:4000;
    }

    server {
        listen 80;

        location /v1/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_buffering off;
        }

        location /health {
            proxy_pass http://gateway/health;
        }

        location /metrics {
            proxy_pass http://gateway/metrics;
        }

        location /ui/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            proxy_pass http://control_plane;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /mlflow/ {
            proxy_pass http://mlflow;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /litellm/ {
            proxy_pass http://litellm;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
