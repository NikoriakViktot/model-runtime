# docker-compose.lite.yml
#
# LITE stack — runs on ANY machine, GPU optional.
#
# PRINCIPLE: this file NEVER uses "runtime: nvidia".
#            GPU support is added via docker-compose.gpu.yml overlay.
#
# Usage:
#   CPU-only:         docker compose -f docker-compose.lite.yml up
#   With GPU:         docker compose -f docker-compose.lite.yml -f docker-compose.gpu.yml up
#   With UI:          docker compose -f docker-compose.lite.yml --profile ui up
#
# Prerequisites:
#   1. Copy .env.lite to .env and fill HF_TOKEN (optional) + GGUF_MODELS_PATH
#   2. Build the cpu_runtime image:
#        docker build -t model-runtime-cpu:latest ./cpu_runtime
#   3. Place a GGUF model at ${GGUF_MODELS_PATH}/model.gguf
#      (e.g. hf_cache/gguf/model.gguf)
#      Download: huggingface-cli download bartowski/Qwen2.5-1.5B-Instruct-GGUF \
#                  Qwen2.5-1.5B-Instruct-Q4_K_M.gguf --local-dir ./hf_cache/gguf \
#                  --local-dir-use-symlinks False && \
#                mv ./hf_cache/gguf/Qwen2.5-1.5B-Instruct-Q4_K_M.gguf ./hf_cache/gguf/model.gguf
#
# Port mapping (avoids conflict with dev stack on 8080/8502/8010):
#   Gateway   → http://localhost:${LITE_GATEWAY_PORT:-8181}
#   MRM       → http://localhost:${LITE_MRM_PORT:-8011}
#   CPU RT    → http://localhost:${LITE_CPU_PORT:-8091}
#   Frontend  → http://localhost:${LITE_FRONTEND_PORT:-8192}   (--profile ui)

version: "3.9"

networks:
  ai_net:
    name: ai_net_lite
    driver: bridge

services:

  # ── Redis — MRM state store ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lite_redis
    # No persistence — lite stack is ephemeral
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ai_net]
    restart: unless-stopped

  # ── Docker Socket Proxy ────────────────────────────────────────────
  # Restricts MRM's Docker API access to only the operations it needs.
  # MRM never touches the raw socket; it talks to this proxy instead.
  socket_proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: lite_socket_proxy
    environment:
      # Allow only container and image operations — deny everything else
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1       # allow POST (create/start/stop/remove)
      DELETE: 1     # allow DELETE (remove containers)
      # Block privileged endpoints
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      INFO: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [ai_net]
    restart: unless-stopped

  # ── CPU Inference Runtime (llama.cpp / GGUF) ───────────────────────
  # Always on in LITE mode. The gateway routes here when GPU is absent.
  # Build once: docker build -t model-runtime-cpu:latest ./cpu_runtime
  #
  # WARNING: without a GGUF model file at ${GGUF_MODELS_PATH}/model.gguf
  #          this service will start but /health will return 503 until
  #          the model finishes loading (or fail on missing file).
  cpu_runtime:
    image: model-runtime-cpu:latest
    container_name: lite_cpu_runtime
    command: uvicorn cpu_runtime.app:app --host 0.0.0.0 --port 8090
    ports:
      - "${LITE_CPU_PORT:-8091}:8090"
    environment:
      # Path to the GGUF model file INSIDE the container (mounted below)
      CPU_RUNTIME_MODEL_PATH: /models/model.gguf
      # Alias used in /v1/models and returned to the gateway
      CPU_RUNTIME_MODEL_ALIAS: ${CPU_MODEL_ALIAS:-cpu-model}
      # Use ≤ 4 threads on low-resource machines
      CPU_RUNTIME_N_THREADS: ${CPU_THREADS:-2}
      # Small context = lower RAM usage
      CPU_RUNTIME_N_CTX: ${CPU_N_CTX:-2048}
      CPU_RUNTIME_MAX_TOKENS_DEFAULT: "256"
      # Backpressure: reject requests beyond this queue depth (returns 429)
      CPU_RUNTIME_MAX_QUEUE_DEPTH: ${CPU_MAX_QUEUE_DEPTH:-8}
      # CORS: comma-separated list of allowed origins, or "*" to allow all
      CPU_RUNTIME_CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_FORMAT: "json"
    volumes:
      # Host directory that contains model.gguf (read-only)
      - ${GGUF_MODELS_PATH:-./hf_cache/gguf}:/models:ro
    healthcheck:
      # /ready returns 503 while loading, 200 when the model is fully loaded.
      # /health is liveness only (always 200); use /ready for readiness here.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/ready')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      # GGUF loading can take 30–120 s on slow hardware
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${CPU_CORES_LIMIT:-4}"
          memory: "${CPU_MEM_LIMIT:-6G}"
    networks: [ai_net]
    restart: unless-stopped

  # ── Model Runtime Manager ──────────────────────────────────────────
  # NO "runtime: nvidia" here — MRM manages containers but doesn't need GPU itself.
  # GPU support is added via docker-compose.gpu.yml overlay.
  # Docker access goes through socket_proxy (principle of least privilege).
  model_runtime_manager:
    build: ./model_runtime_manager
    container_name: lite_mrm
    command: uvicorn mrm.app:app --host 0.0.0.0 --port 8010
    ports:
      - "${LITE_MRM_PORT:-8011}:8010"
    environment:
      MRM_REDIS_URL: redis://redis:6379/2
      MRM_DOCKER_NETWORK: ai_net_lite
      MRM_IDLE_TIMEOUT_SEC: "1800"
      MRM_SWEEP_INTERVAL_SEC: "60"
      MRM_HEALTH_TIMEOUT_SEC: "600"
      MRM_KEEP_FAILED_CONTAINERS: "0"
      MRM_ARTIFACTS_HOST_PATH: ${PWD}/artifacts
      MRM_HF_CACHE_HOST_PATH: ${PWD}/hf_cache
      # LITE-specific: when GPU unavailable, MRM redirects to cpu_runtime
      MRM_AUTO_FALLBACK_CPU_URL: http://cpu_runtime:8090
      MRM_AUTO_FALLBACK_CPU_ALIAS: ${CPU_MODEL_ALIAS:-cpu-model}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      # Route Docker API calls through the socket proxy (not the raw socket)
      DOCKER_HOST: tcp://socket_proxy:2375
    volumes:
      # No docker.sock mount — MRM uses socket_proxy instead
      - ./artifacts:/artifacts
      - ./hf_cache:/app_host/hf_cache
    depends_on:
      redis:
        condition: service_healthy
      cpu_runtime:
        condition: service_healthy
      socket_proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks: [ai_net]
    restart: unless-stopped

  # ── API Gateway ────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: lite_gateway
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8080
    ports:
      - "${LITE_GATEWAY_PORT:-8181}:8080"
    environment:
      GATEWAY_MRM_URL: http://model_runtime_manager:8010
      GATEWAY_USE_SCHEDULER: "false"
      GATEWAY_MLFLOW_ENABLED: "false"
      GATEWAY_AUTO_PROVISION: "false"
      # Map GPU model IDs to the CPU runtime alias.
      # Format: "gpu-model-id:cpu-alias,another-gpu-id:cpu-alias"
      # Default: map the CPU alias to itself so direct requests with that name work.
      # Users may add GPU→CPU mappings: GATEWAY_CPU_MODEL_MAP=Qwen/Qwen1.5-1.8B-Chat:cpu-model
      GATEWAY_CPU_MODEL_MAP: ${GATEWAY_CPU_MODEL_MAP:-${CPU_MODEL_ALIAS:-cpu-model}:${CPU_MODEL_ALIAS:-cpu-model}}
      # In LITE mode, route ALL requests to CPU by default (99999 = always CPU).
      # Override via CPU_ROUTING_THRESHOLD env var.
      # Set to 300 to only route short requests to CPU (mixed GPU+CPU mode).
      GATEWAY_CPU_ROUTING_MAX_TOKENS_THRESHOLD: ${CPU_ROUTING_THRESHOLD:-99999}
      # Block streaming on CPU runtime (slower, may timeout)
      GATEWAY_CPU_ROUTING_BLOCK_STREAMING: "false"
      # CORS: comma-separated list of allowed origins, or "*" to allow all
      GATEWAY_CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOG_FORMAT: "json"
    depends_on:
      model_runtime_manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [ai_net]
    restart: unless-stopped

  # ── Frontend (optional — comment out to save RAM) ──────────────────
  frontend:
    build: ./frontend
    container_name: lite_frontend
    command: streamlit run ui/app.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "${LITE_FRONTEND_PORT:-8192}:8502"
    environment:
      GATEWAY_URL: http://gateway:8080
      MRM_URL: http://model_runtime_manager:8010
      SCHEDULER_URL: ""
      CONTROL_PLANE_URL: ""
      PROMETHEUS_URL: ""
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8502/_stcore/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: "512M"
    networks: [ai_net]
    restart: unless-stopped
    profiles: [ui]    # opt-in: docker compose -f docker-compose.lite.yml --profile ui up
